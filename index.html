    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #d9534f;
            margin-bottom: 25px;
        }
        .search-box {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        .search-box input {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            border-color: #d9534f;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
            color: #555;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
        .no-result {
            display: none;
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>福懋、福壽及泰山油品下游業者清單</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="請輸入縣市、業者名稱或購買品項進行搜尋...">
    </div>

    <table id="oilTable">
        <thead>
            <tr>
                <th>序號</th>
                <th>縣市</th>
                <th>業者</th>
                <th>購買品項</th>
            </tr>
        </thead>
        <tbody>
            <tr><td>1</td><td>基隆市</td><td>蔡0彤</td><td>益康大豆沙拉油 18L</td></tr>
            <tr><td>2</td><td>基隆市</td><td>三和行</td><td>益康大豆沙拉油 18L</td></tr>
            </tbody>
    </table>
    
    <div id="noResult" class="no-result">沒有找到符合關鍵字的資料</div>
</div>

<script>
    function filterTable() {
        var input = document.getElementById("searchInput");
        var filter = input.value.toUpperCase();
        var table = document.getElementById("oilTable");
        var tr = table.getElementsByTagName("tr");
        var noResult = document.getElementById("noResult");
        var hasVisibleRow = false;

        for (var i = 1; i < tr.length; i++) {
            var rowData = tr[i].textContent || tr[i].innerText;
            if (rowData.toUpperCase().indexOf(filter) > -1) {
                tr[i].style.display = "";
                hasVisibleRow = true;
            } else {
                tr[i].style.display = "none";
            }
        }
        noResult.style.display = hasVisibleRow ? "none" : "block";
    }
</script>

</body>
</html>
